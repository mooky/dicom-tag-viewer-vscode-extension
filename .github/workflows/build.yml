name: Build

on:
  push:
    branches:
      - 'feature/**'
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - run: npm run compile

      - run: npm run package:vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'
